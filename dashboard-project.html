<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Detail — JIC Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0F19;--surface:#131829;--surface-2:#1a2035;--border:#1e2640;--text:#d1d5db;--text-strong:#f3f4f6;--muted:#6b7280;--accent:#00D4FF;--accent-2:#00FFC8;--red:#ef4444;--yellow:#f59e0b;--green:#10b981;--radius:8px;--font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-family:'Space Grotesk',sans-serif;font-size:18px;color:var(--text-strong)}
header h1 span{color:var(--accent)}
header nav a{color:var(--muted);text-decoration:none;font-size:13px;margin-left:20px;transition:color .2s}
header nav a:hover{color:var(--accent)}
header nav a.active{color:var(--accent);font-weight:600}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:16px;transition:color .2s}
.back:hover{color:var(--accent)}
.container{max-width:1200px;margin:0 auto;padding:32px}
.page-title{font-size:24px;font-weight:700;color:var(--text-strong)}
.page-id{font-family:monospace;font-size:12px;color:var(--muted);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h3{font-size:13px;font-weight:600;color:var(--text-strong);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.section-item{border-bottom:1px solid var(--border);padding:8px 0}
.section-item:last-child{border-bottom:none}
.section-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:4px 0}
.section-header .name{font-size:13px;color:var(--text-strong);font-weight:500}
.section-header .count{font-size:11px;color:var(--muted)}
.section-header .arrow{color:var(--muted);font-size:10px;transition:transform .2s}
.section-header .arrow.open{transform:rotate(90deg)}
.section-body{display:none;padding:8px 0 0 12px}
.section-body.open{display:block}
.field-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(30,38,64,.5)}
.field-row:last-child{border-bottom:none}
.field-key{color:var(--muted);font-family:monospace;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}
.field-val{color:var(--text);text-align:right;max-width:55%;word-break:break-word}
.pipeline-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:var(--font-sans)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0B0F19}
.btn-primary:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){border-color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn .spinner{display:none;width:14px;height:14px;border:2px solid rgba(11,15,25,.3);border-top-color:#0B0F19;border-radius:50%;animation:spin .6s linear infinite}
.btn.loading .spinner{display:inline-block}
.btn.loading .label{opacity:.6}
@keyframes spin{to{transform:rotate(360deg)}}
.output-box{background:#0a0d14;border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:monospace;font-size:11px;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:400px;overflow:auto;margin-top:8px}
.output-box.success{border-left:3px solid var(--green)}
.output-box.error{border-left:3px solid var(--red)}
.output-box .key{color:var(--accent)}
.output-box .string{color:var(--accent-2)}
.output-box .number{color:var(--yellow)}
.output-box .null{color:var(--muted)}
.output-placeholder{background:var(--surface-2);border:1px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
.pipeline-status{display:flex;gap:8px;margin-bottom:16px}
.pipeline-step{flex:1;text-align:center;padding:8px;border-radius:var(--radius);font-size:11px;font-weight:500;background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
.pipeline-step.done{background:rgba(16,185,129,.1);border-color:var(--green);color:var(--green)}
.pipeline-step.fail{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.pipeline-step.active{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}
.loading{text-align:center;padding:48px;color:var(--muted)}
.error-banner{background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red)}
@media(max-width:600px){header{padding:12px 16px;flex-direction:column;gap:8px}
.container{padding:16px}
.pipeline-btns{flex-direction:column}
.pipeline-status{flex-direction:column}}
</style>
</head>
<body>
<header>
  <h1>JIC <span>Dashboard</span></h1>
  <nav>
    <a href="/dashboard.html">Projects</a>
    <a href="/">Portfolio</a>
  </nav>
</header>
<div class="container" id="app">
  <a href="/dashboard.html" class="back">← Projects</a>
  <div id="header"></div>
  <div class="grid-2">
    <div class="card">
      <h3>Pipeline</h3>
      <div class="pipeline-status" id="pipelineStatus"></div>
      <div class="pipeline-btns" id="pipelineBtns"></div>
      <div id="output"></div>
    </div>
    <div class="card">
      <h3>Sections</h3>
      <div id="sections"></div>
    </div>
  </div>
</div>
<script>
let projectId = new URLSearchParams(location.search).get('id');
let state = null;

function escapeHTML(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function jsonHighlight(o){
  if(!o)return '<span class="null">null</span>';
  const j=JSON.stringify(o,null,2);
  return j.replace(/"([^"]+)":/g,'<span class="key">"$1"</span>:')
          .replace(/"([^"]*?)"/g,'<span class="string">"$1"</span>')
          .replace(/\b(\d+)\b/g,'<span class="number">$1</span>')
          .replace(/\b(null|true|false)\b/g,'<span class="null">$1</span>');
}

async function load(){
  if(!projectId){document.getElementById('header').innerHTML='<div class="error-banner">Missing id parameter</div>';return}
  document.getElementById('header').innerHTML='<div class="loading">Loading project...</div>';
  try{
    const r=await fetch('/api/projects/detail?id='+encodeURIComponent(projectId));
    if(!r.ok)throw new Error(await r.text());
    state=await r.json();
    renderHeader();
    renderSections();
    renderPipeline();
  }catch(e){
    document.getElementById('header').innerHTML='<div class="error-banner">Failed to load: '+e.message+'</div>';
  }
}

function renderHeader(){
  const d=state;
  const biz=d.grouped?.business||{};
  const name=biz.biz_name||projectId;
  const contact=biz.biz_contacto||'—';
  const sections=Object.keys(d.grouped||{}).length;
  const fields=d.responses.length;
  document.getElementById('header').innerHTML=`
    <div class="page-title">${escapeHTML(name)}</div>
    <div class="page-id">${projectId}</div>
    <div class="page-sub">${sections} sections · ${fields} fields · Contact: ${escapeHTML(contact)}</div>
  `;
}

function renderSections(){
  const g=state.grouped||{};
  const secDiv=document.getElementById('sections');
  const secOrder=['business','goals','competition','audience','branding','site','content','services','social_proof','functionality','seo','references','conversion','essence'];
  let html='';
  for(const key of secOrder){
    if(!g[key]||Object.keys(g[key]).length===0)continue;
    const fields=Object.entries(g[key]);
    html+=`
      <div class="section-item">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="name">${key.replace(/_/g,' ')}</span>
          <span><span class="count">${fields.length}</span> <span class="arrow">▶</span></span>
        </div>
        <div class="section-body">${fields.map(([k,v])=>`
          <div class="field-row">
            <span class="field-key">${escapeHTML(k)}</span>
            <span class="field-val">${escapeHTML(Array.isArray(v)?v.join(', '):v)}</span>
          </div>
        `).join('')}</div>
      </div>
    `;
  }
  secDiv.innerHTML=html||'<div class="output-placeholder">No sections loaded</div>';
}

function toggleSection(el){
  const body=el.nextElementSibling;
  const arrow=el.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function renderPipeline(){
  const steps=['Plan','Scaffold','Deploy'];
  document.getElementById('pipelineStatus').innerHTML=steps.map(s=>`<div class="pipeline-step" id="step-${s.toLowerCase()}">${s}</div>`).join('');
  document.getElementById('pipelineBtns').innerHTML=`
    <button class="btn btn-secondary" id="btn-plan" onclick="runPlan()"><span class="label">Run Plan</span><span class="spinner"></span></button>
    <button class="btn btn-secondary" id="btn-scaffold" onclick="runScaffold()"><span class="label">Run Scaffold</span><span class="spinner"></span></button>
    <button class="btn btn-secondary" id="btn-deploy" onclick="runDeploy()"><span class="label">Run Deploy</span><span class="spinner"></span></button>
    <button class="btn btn-primary" id="btn-full" onclick="runFull()"><span class="label">Full Pipeline</span><span class="spinner"></span></button>
  `;
}

async function runPlan(){
  const btn=document.getElementById('btn-plan');
  const out=document.getElementById('output');
  btn.classList.add('loading');btn.disabled=true;
  updateStep('plan','active');
  try{
    const r=await fetch('/api/projects/run-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:projectId})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    out.innerHTML='<div class="output-box success">'+jsonHighlight(d.ir||d)+'</div>';
    updateStep('plan','done');
  }catch(e){
    out.innerHTML='<div class="output-box error">Error: '+escapeHTML(e.message)+'</div>';
    updateStep('plan','fail');
  }finally{btn.classList.remove('loading');btn.disabled=false}
}

async function runScaffold(){
  const btn=document.getElementById('btn-scaffold');
  const out=document.getElementById('output');
  btn.classList.add('loading');btn.disabled=true;
  updateStep('scaffold','active');
  try{
    const r=await fetch('/api/projects/run-scaffold',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:projectId})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    out.innerHTML='<div class="output-box success">'+jsonHighlight(d.scaffold||d)+'</div>';
    updateStep('scaffold','done');
  }catch(e){
    out.innerHTML='<div class="output-box error">Error: '+escapeHTML(e.message)+'</div>';
    updateStep('scaffold','fail');
  }finally{btn.classList.remove('loading');btn.disabled=false}
}

async function runDeploy(){
  const btn=document.getElementById('btn-deploy');
  const out=document.getElementById('output');
  btn.classList.add('loading');btn.disabled=true;
  updateStep('deploy','active');
  try{
    const r=await fetch('/api/projects/run-deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:projectId})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    out.innerHTML='<div class="output-box success">'+jsonHighlight(d.deploy||d)+'</div>';
    updateStep('deploy','done');
  }catch(e){
    out.innerHTML='<div class="output-box error">Error: '+escapeHTML(e.message)+'</div>';
    updateStep('deploy','fail');
  }finally{btn.classList.remove('loading');btn.disabled=false}
}

async function runFull(){
  const btn=document.getElementById('btn-full');
  const out=document.getElementById('output');
  btn.classList.add('loading');btn.disabled=true;
  ['plan','scaffold','deploy'].forEach(s=>updateStep(s,'active'));
  try{
    const r=await fetch('/api/projects/run-deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:projectId})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    out.innerHTML='<div class="output-box success">'+jsonHighlight(d)+'</div>';
    if(d.scaffold)updateStep('scaffold','done');
    if(d.deploy)updateStep('deploy','done');
    updateStep('plan','done');
  }catch(e){
    out.innerHTML='<div class="output-box error">Error: '+escapeHTML(e.message)+'</div>';
    ['plan','scaffold','deploy'].forEach(s=>updateStep(s,'fail'));
  }finally{btn.classList.remove('loading');btn.disabled=false}
}

function updateStep(name,status){
  const el=document.getElementById('step-'+name);
  if(el){el.className='pipeline-step '+status}
}

load();
</script>
</body>
</html>
