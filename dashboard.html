<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Dashboard — Agent Pack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0F19;--surface:#131829;--surface-2:#1a2035;--border:#1e2640;--text:#d1d5db;--text-strong:#f3f4f6;--muted:#6b7280;--accent:#00D4FF;--accent-2:#00FFC8;--red:#ef4444;--yellow:#f59e0b;--green:#10b981;--radius:8px;--font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-family:'Space Grotesk',sans-serif;font-size:18px;color:var(--text-strong)}
header h1 span{color:var(--accent)}
header nav a{color:var(--muted);text-decoration:none;font-size:13px;margin-left:20px;transition:color .2s}
header nav a:hover{color:var(--accent)}
header nav a.active{color:var(--accent);font-weight:600}
.container{max-width:1200px;margin:0 auto;padding:32px}
.page-title{font-size:24px;font-weight:700;color:var(--text-strong);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-card .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--muted);margin-top:2px}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color .2s, transform .2s}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.project-card .name{font-size:15px;font-weight:600;color:var(--text-strong);margin-bottom:4px}
.project-card .id{font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:12px}
.project-card .meta{display:flex;gap:16px;font-size:12px;color:var(--muted)}
.project-card .meta span{display:flex;align-items:center;gap:4px}
.project-card .meta .icon{width:14px;height:14px;opacity:.5}
.empty{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;color:var(--muted);font-size:14px}
.error-banner{background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red)}
.loading{text-align:center;padding:48px;color:var(--muted);font-size:14px}
footer{margin-top:48px;padding:24px 32px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center}
@media(max-width:600px){header{padding:12px 16px;flex-direction:column;gap:8px}
.container{padding:16px}
.projects-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>JIC <span>Dashboard</span></h1>
  <nav>
    <a href="/dashboard.html" class="active">Projects</a>
    <a href="/">Portfolio</a>
  </nav>
</header>
<div class="container" id="app">
  <div class="page-title">Projects</div>
  <div class="page-sub">All briefs received through Brief Maestro</div>
  <div class="stats" id="stats"></div>
  <div class="loading" id="loading">Loading projects...</div>
  <div class="projects-grid" id="grid"></div>
</div>
<footer>Agent Pack v1.5.0 — JIC Dashboard</footer>
<script>
async function load(){
  const grid=document.getElementById('grid');
  const stats=document.getElementById('stats');
  const loading=document.getElementById('loading');
  try{
    const r=await fetch('/api/projects/list');
    if(!r.ok)throw new Error(await r.text());
    const data=await r.json();
    const projects=data.projects||[];
    loading.style.display='none';
    if(projects.length===0){
      grid.innerHTML='<div class="empty">No projects yet. Submit a brief to see it here.</div>';
      stats.innerHTML='<div class="stat-card"><div class="num">0</div><div class="label">Projects</div></div>';
      return;
    }
    const total=projects.length;
    const fields=projects.reduce((s,p)=>s+p.fields,0);
    const newest=new Date(projects[0].created_at).toLocaleDateString();
    stats.innerHTML=`
      <div class="stat-card"><div class="num">${total}</div><div class="label">Projects</div></div>
      <div class="stat-card"><div class="num">${fields}</div><div class="label">Total fields</div></div>
      <div class="stat-card"><div class="num">${projects[0].sections}</div><div class="label">Sections (latest)</div></div>
      <div class="stat-card"><div class="num">${newest}</div><div class="label">Latest activity</div></div>
    `;
    grid.innerHTML=projects.map(p=>`
      <div class="project-card" onclick="location.href='/dashboard-project.html?id=${encodeURIComponent(p.project_id)}'">
        <div class="name">${escapeHTML(p.name)}</div>
        <div class="id">${p.project_id}</div>
        <div class="meta">
          <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>${p.sections} sections</span>
          <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${p.fields} fields</span>
          <span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${new Date(p.created_at).toLocaleDateString()}</span>
        </div>
      </div>
    `).join('');
  }catch(e){
    loading.style.display='none';
    grid.innerHTML='<div class="error-banner">Failed to load projects: '+e.message+'</div>';
  }
}
function escapeHTML(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
load();
</script>
</body>
</html>
